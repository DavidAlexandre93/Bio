name: Frontend CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks (lint, format, tests, coverage, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm run test

      - name: Coverage tests
        run: npm run test:coverage

      - name: Build validation
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: error

  vulnerability-scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  dependency-review:
    if: github.event_name == 'pull_request'
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v5

  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    needs: [quality, vulnerability-scan]
    if: always()
    steps:
      - name: Enforce successful pipeline
        run: |
          if [ "${{ needs.quality.result }}" != "success" ] || [ "${{ needs.vulnerability-scan.result }}" != "success" ]; then
            echo "Quality gate failed."
            exit 1
          fi
          echo "Quality gate passed."
